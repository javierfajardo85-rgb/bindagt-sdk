name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Set version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$CURRENT_VERSION" ]; then
            npm version --no-git-tag-version "$TAG_VERSION"
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Supply-chain artefacts (DX_Spec.md §5.5): SHA-256 checksums + SBOM
      # attached to the GitHub release, matching @bindagt/openai's pipeline.
      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum $(find . -type f) > ../SHA256SUMS.txt
          cd ..
      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file bom.json
      - name: Attach checksums + SBOM to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SHA256SUMS.txt
            bom.json
